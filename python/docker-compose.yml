version: '3.8'

services:
  db:
    image: postgres:15
    container_name: civil42_app
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: 87115
      POSTGRES_DB: our_app_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: .       # path to FastAPI Dockerfile
    container_name: our_app-backend
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://app_user:87115@db:5432/blog_api_db
    volumes:
      - .:/code
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
